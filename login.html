<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remio – Smart Reminder App</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070a15;
      padding: 2rem 1rem;
    }

    /* ── Phone Shell ── */
    .phone-wrap {
      background: #0d0f1a;
      border-radius: 40px;
      padding: 12px;
      border: 0.5px solid rgba(255,255,255,0.08);
      width: 360px;
      min-height: 720px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .phone-notch {
      width: 90px;
      height: 24px;
      background: #0d0f1a;
      border-radius: 0 0 14px 14px;
      margin: 0 auto 10px;
    }

    /* ── Screen ── */
    .screen {
      background: #10132b;
      border-radius: 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 32px;
      position: relative;
      overflow: hidden;
    }

    /* Glow effects */
    .glow-top {
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-bottom {
      position: absolute;
      bottom: -40px; right: -30px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 4px;
      margin-bottom: 10px;
      z-index: 1;
    }
    .status-time {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    /* ── Logo Area ── */
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 10px 0 26px;
      z-index: 1;
    }
    .icon-ring {
      width: 68px; height: 68px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 28px rgba(99,102,241,0.4);
    }
    .app-name {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }
    .tagline {
      font-size: 10px;
      color: #6366f1;
      margin-top: 5px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Form ── */
    .form-area { width: 100%; z-index: 1; }

    .input-wrap { position: relative; margin-bottom: 14px; }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      opacity: 0.4;
      pointer-events: none;
    }

    .field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 13px 13px 40px;
      color: #e5e7eb;
      font-size: 13px;
      font-family: 'Sora', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .field:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.07);
    }
    .field::placeholder { color: #4b5563; }

    .toggle-eye {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .toggle-eye:hover { opacity: 0.7; }

    /* Error message */
    .error-msg {
      font-size: 11px;
      color: #f87171;
      margin: -8px 0 10px 4px;
      display: none;
    }

    .forgot-row { text-align: right; margin-bottom: 18px; }
    .forgot-row a { font-size: 11px; color: #6366f1; text-decoration: none; }
    .forgot-row a:hover { text-decoration: underline; }

    /* Sign In Button */
    .btn-signin {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border: none;
      color: #fff;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }
    .btn-signin:hover { opacity: 0.88; }
    .btn-signin:active { transform: scale(0.98); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .divider-line {
      flex: 1;
      height: 0.5px;
      background: rgba(255,255,255,0.08);
    }
    .divider-text { font-size: 11px; color: #4b5563; }

    /* Social Buttons */
    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }
    .social-btn {
      flex: 1;
      padding: 11px;
      border-radius: 13px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.09); }
    .social-label { font-size: 12px; color: #9ca3af; }

    /* Register */
    .register-row {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 18px;
    }
    .register-row a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }
    .register-row a:hover { text-decoration: underline; }

    /* Context Badges */
    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .badge-loc { background: rgba(16,185,129,0.12); color: #34d399; border: 0.5px solid rgba(16,185,129,0.2); }
    .badge-ai  { background: rgba(99,102,241,0.12);  color: #818cf8; border: 0.5px solid rgba(99,102,241,0.2); }
    .badge-prv { background: rgba(251,191,36,0.1);   color: #fbbf24; border: 0.5px solid rgba(251,191,36,0.15); }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-g { background: #34d399; }
    .dot-p { background: #818cf8; }
    .dot-y { background: #fbbf24; }

    /* Success Toast */
    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e3a;
      border: 0.5px solid rgba(99,102,241,0.4);
      color: #a5b4fc;
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ── Phone Shell ── -->
  <div class="phone-wrap">
    <div class="phone-notch"></div>

    <div class="screen">
      <div class="glow-top"></div>
      <div class="glow-bottom"></div>

      
      <!-- Logo -->
      <div class="logo-area">
        <div class="icon-ring">
  <img src="logo.png" alt="logo" style="width:36px; height:36px; object-fit:contain;">
</div>
        <p class="app-name">Remio</p>
        <p class="tagline">Smart · Context · Aware</p>
      </div>

      <!-- Form -->
      <div class="form-area">

        <!-- Email Field -->
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="3" width="13" height="10" rx="1.5" stroke="white" stroke-width="1.2"/>
            <path d="M1.5 5l6.5 4.5L14.5 5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <input class="field" id="email" type="email" placeholder="Email address" autocomplete="off"/>
        </div>
        <p class="error-msg" id="email-err">Please enter a valid email.</p>

        <!-- Password Field -->
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="white" stroke-width="1.2"/>
            <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
            <circle cx="8" cy="10.5" r="1" fill="white" opacity="0.7"/>
          </svg>
          <input class="field" id="password" type="password" placeholder="Password"/>
          <svg class="toggle-eye" id="eye-icon" viewBox="0 0 16 16" fill="none"
               width="18" height="18" onclick="togglePwd()">
            <ellipse cx="8" cy="8" rx="6" ry="4" stroke="white" stroke-width="1.2"/>
            <circle cx="8" cy="8" r="2" stroke="white" stroke-width="1.2"/>
          </svg>
        </div>
        <p class="error-msg" id="pwd-err">Password must be at least 6 characters.</p>

        <!-- Forgot -->
        <div class="forgot-row">
          <a href="#">Forgot password?</a>
        </div>

        <!-- Sign In Button -->
        <button class="btn-signin" onclick="handleLogin()">Sign In</button>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or continue with</span>
          <div class="divider-line"></div>
        </div>

        <!-- Social Buttons -->
        <div class="social-row">
          <div class="social-btn" onclick="socialLogin('Google')">
            <svg width="15" height="15" viewBox="0 0 18 18">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            <span class="social-label">Google</span>
          </div>
          <div class="social-btn" onclick="socialLogin('Apple')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <span class="social-label">Apple</span>
          </div>
        </div>

        <!-- Register -->
        <div class="register-row">
          New here? <a href="index.html">Create account</a>
        </div>

        <!-- Badges -->
        <div class="badges">
          <div class="badge badge-loc"><div class="dot dot-g"></div>Location-aware</div>
          <div class="badge badge-ai"><div class="dot dot-p"></div>AI-powered</div>
          <div class="badge badge-prv"><div class="dot dot-y"></div>Privacy-first</div>
        </div>

      </div><!-- /form-area -->
    </div><!-- /screen -->
  </div><!-- /phone-wrap -->

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // Live Clock
    function updateClock() {
      var now = new Date();
      var h = now.getHours().toString().padStart(2,'0');
      var m = now.getMinutes().toString().padStart(2,'0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Show/Hide Password
    var pwdVisible = false;
    function togglePwd() {
      pwdVisible = !pwdVisible;
      document.getElementById('password').type = pwdVisible ? 'text' : 'password';
    }

    // Toast helper
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 3000);
    }

    // Login Validation
    async function handleLogin() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var emailErr = document.getElementById('email-err');
      var pwdErr   = document.getElementById('pwd-err');
      var valid    = true;

      // Reset errors
      emailErr.style.display = 'none';
      pwdErr.style.display   = 'none';

      // Email check
      var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        emailErr.style.display = 'block';
        valid = false;
      }

      // Password check
      if (password.length < 8) {
        pwdErr.style.display = 'block';
        valid = false;
      }

      if (!valid) {
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showToast(data.message || 'Invalid login.');
          return;
        }

        localStorage.setItem("userName", data.user.name || "");
        localStorage.setItem("userHandle", data.user.username || "");
        localStorage.setItem("userEmail", data.user.email || email);

        showToast('Login successful! Redirecting...');
        setTimeout(function(){ window.location.href = 'dashboard.html'; }, 1200);
        return;
      } catch (error) {
        showToast('Server not reachable. Start backend on port 5000.');
        return;
      }
    }

    // Social Login
    function socialLogin(provider) {
      showToast('Connecting with ' + provider + '...');
      
    }
  </script>
</body>
</html>
